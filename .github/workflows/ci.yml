name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run API unit tests
        run: pnpm --filter @imessage-scheduler/api test

      - name: Run Gateway unit tests
        run: pnpm --filter @imessage-scheduler/gateway test

      - name: Run Web unit tests
        run: pnpm --filter @imessage-scheduler/web test

  e2e-api:
    name: E2E API Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright
        run: pnpm --filter @imessage-scheduler/e2e exec playwright install --with-deps chromium

      - name: Run E2E API tests
        run: pnpm test:e2e:api

  e2e-browser:
    name: E2E Browser Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @imessage-scheduler/e2e exec playwright install --with-deps chromium

      - name: Build Next.js app
        run: pnpm --filter @imessage-scheduler/web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001

      - name: Run E2E browser tests
        run: pnpm test:e2e:browser
        env:
          CI: true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/test-results/
          retention-days: 7
